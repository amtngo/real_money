<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>コンビニチェック</title>

<style>

body{
  margin:0;
  padding:20px;
  background:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:480px;
  background:#fff;
  border-radius:22px;
  padding:28px 20px;
  box-sizing:border-box;
  box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:800;
  margin-bottom:6px;
  color:#111;
}

.sub{
  text-align:center;
  font-size:14px;
  color:#666;
  line-height:1.6;
  margin-bottom:18px;
}

.question{
  font-size:24px;
  font-weight:700;
  text-align:center;
  line-height:1.5;
  margin-bottom:30px;
  color:#111;
}

.options{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.option{
  border:none;
  border-radius:14px;
  padding:7px;
  font-size:18px;
  font-weight:700;
  background:#f1f1f1;
  color:#111;
  cursor:pointer;
  transition:0.15s;
}

.option:active{
  transform:scale(0.98);
}

.result-wrap{
  display:none;
  margin-top:30px;
  text-align:center;
}

.result-text{
  font-size:18px;
  color:#666;
  margin-bottom:8px;
}

.percent{
  font-size:68px;
  font-weight:800;
  line-height:1;
  margin-bottom:16px;
  color:#111;
}

.percent-sub{
  font-size:18px;
  color:#666;
  margin-bottom:22px;
}

.bar-wrap{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:24px;
}

.box{
  width:22px;
  height:22px;
  border-radius:4px;
  opacity:0.2;
}

.red{
  background:#ffb3b3;
}

.yellow{
  background:#ffe69b;
}

.green{
  background:#b8f5b8;
}

.message{
  font-size:17px;
  line-height:1.7;
  color:#444;
  margin-top:12px;
}

.lock{
  text-align:center;
  font-size:18px;
  line-height:1.9;
  color:#444;
  padding:36px 8px;
  display:none;
}

.category-link{
  margin-top:18px;
  font-size:20px;
  font-weight:700;
  color:#222;
  cursor:pointer;
}

.footer{
  margin-top:48px;
  text-align:center;
  font-size:12px;
  color:#999;
  line-height:1.7;
  opacity:0.75;
}

</style>
</head>

<body>

<div class="container">

<div class="title">コンビニチェック</div>

<div class="sub">
選ぶだけで<br>
今の反応割合が表示されます
</div>

<div id="quizArea">

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="result-wrap" id="resultWrap">

<div class="result-text">
あなたの選択は
</div>

<div class="percent" id="percent">
67%
</div>

<div class="percent-sub">
この選択でした
</div>

<div class="bar-wrap" id="barWrap"></div>

<div class="message" id="message"></div>

<div class="category-link" onclick="goCategoryTop()">
他のカテゴリを見る
</div>

</div>

</div>

<div class="lock" id="lockMessage">

今日の割合は確認済みです。<br>
次の確認は 10時間後にできます。

<div class="category-link" onclick="goCategoryTop()">
他のカテゴリを見る
</div>

</div>

<script>

const questions = [

{
q:"コンビニでつい買ってしまう物は？",
a:["コーヒー", "お菓子", "おにぎり", "アイス"]
},

{
q:"レジ前で手が伸びる物は？",
a:["チョコ", "ガム", "飲み物", "ホットスナック"]
},

{
q:"夜に買うことが多い物は？",
a:["カップ麺", "アイス", "お酒", "スナック菓子"]
},

{
q:"給料日前でも買ってしまう物は？",
a:["コーヒー", "お菓子", "飲み物", "弁当"]
},

{
q:"毎回買うか迷う物は？",
a:["スイーツ", "ホットスナック", "雑誌", "新商品"]
},

{
q:"つい追加してしまう物は？",
a:["お菓子", "飲み物", "アイス", "パン"]
},

{
q:"一番お金を使っている物は？",
a:["コーヒー", "お菓子", "弁当", "アイス"]
},

{
q:"コンビニで買うと満足する物は？",
a:["スイーツ", "ホットスナック", "コーヒー", "アイス"]
},

{
q:"気づくと買っている物は？",
a:["チョコ", "飲み物", "おにぎり", "パン"]
},

{
q:"一番やめられない物は？",
a:["コーヒー", "お菓子", "アイス", "ホットスナック"]
},

{
q:"コンビニで一番見るコーナーは？",
a:["スイーツ", "飲み物", "お弁当", "新商品"]
},

{
q:"疲れた日に買う物は？",
a:["スイーツ", "お酒", "ホットスナック", "アイス"]
},

{
q:"値上がりしても買う物は？",
a:["コーヒー", "おにぎり", "お菓子", "アイス"]
},

{
q:"朝によく買う物は？",
a:["コーヒー", "おにぎり", "パン", "飲み物"]
},

{
q:"昼によく買う物は？",
a:["お弁当", "おにぎり", "サンドイッチ", "カップ麺"]
},

{
q:"新商品だと試したくなる物は？",
a:["スイーツ", "飲み物", "お菓子", "アイス"]
},

{
q:"コンビニで一番後悔しやすい買い物は？",
a:["お菓子", "スイーツ", "アイス", "ホットスナック"]
},

{
q:"今すぐ一つもらえるなら？",
a:["コーヒー", "スイーツ", "おにぎり", "アイス"]
},

{
q:"つい高くても選ぶ物は？",
a:["コーヒー", "お弁当", "スイーツ", "飲み物"]
},

{
q:"コンビニで節約しにくい物は？",
a:["コーヒー", "お菓子", "アイス", "ホットスナック"]
},

{
q:"コンビニで買う楽しみは？",
a:["スイーツ", "新商品", "ホットスナック", "飲み物"]
}

];

const LOCK_HOURS = 10;

const saved = localStorage.getItem("conbini_lock");

if(saved){

  const now = Date.now();

  const diff = now - Number(saved);

  if(diff < LOCK_HOURS * 60 * 60 * 1000){

    document.getElementById("quizArea").style.display = "none";

    document.getElementById("lockMessage").style.display = "block";

  }else{

    showQuestion();

  }

}else{

  showQuestion();

}

function showQuestion(){

  const random = questions[Math.floor(Math.random()*questions.length)];

  document.getElementById("question").innerHTML = random.q;

  const options = document.getElementById("options");

  random.a.forEach(text=>{

    const btn = document.createElement("button");

    btn.className = "option";

    btn.innerText = text;

    btn.onclick = ()=>selectOption();

    options.appendChild(btn);

  });

}

function selectOption(){

  localStorage.setItem("conbini_lock",Date.now());

  document.querySelectorAll(".option").forEach(btn=>{

    btn.disabled = true;

  });

  const percent = makePercent();

  document.getElementById("percent").innerText = percent + "%";

  makeBoxes(percent);

  makeMessage(percent);

  document.getElementById("resultWrap").style.display = "block";

}

function makePercent(){

  const arr = [
    31,34,37,41,43,46,
    52,57,61,63,67,
    72,74,76,79,83,86
  ];

  return arr[Math.floor(Math.random()*arr.length)];

}

function makeBoxes(percent){

  const wrap = document.getElementById("barWrap");

  wrap.innerHTML = "";

  const active = Math.round(percent / 10);

  for(let i=0;i<10;i++){

    const box = document.createElement("div");

    if(i<3){

      box.className = "box red";

    }else if(i<6){

      box.className = "box yellow";

    }else{

      box.className = "box green";

    }

    if(i < active){

      box.style.opacity = "1";

    }

    wrap.appendChild(box);

  }

}

function makeMessage(percent){

  let text = "";

  if(percent <= 40){

    text = "少数派になりやすい反応です";

  }
  else if(percent <= 60){

    text = "意外と近い反応が集まっています";

  }
  else if(percent <= 80){

    text = "かなり共感されやすい選択です";

  }
  else{

    text = "かなり多く選ばれている反応です";

  }

  document.getElementById("message").innerHTML = text;

}

function goCategoryTop(){

  location.href = "../";

}

</script>

</body>
</html>
